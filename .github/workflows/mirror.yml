name: Mirror GAS pages to GitHub Pages

# 英唱社公開網頁靜態鏡像：
# GAS HtmlService 的 Google iframe 外殼在手機（LINE WebView／行動 Safari）常逾時打不開，
# 所以反向由 Actions 定時 curl /exec 抓「真正的內頁 HTML」發佈成靜態 Pages（手機可開、CDN 秒開）。
# GAS 端零改動、零 token；抓不到（GAS 節流/冷啟動）就讓 job 失敗，Pages 保留上一版，不會發半套。

on:
  schedule:
    - cron: '17 * * * *'   # 每小時；GitHub cron 有幾分鐘漂移屬正常
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      EXEC: https://script.google.com/macros/s/AKfycbyWnEPtYygRHFXCit_siswpLjD-SjF-H47P72xEW2Ybah-mok2UcSZdJMKFUpApVPL1/exec
      UA: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126 Safari/537.36
    steps:
      - uses: actions/checkout@v4
      - name: Fetch pages from GAS
        run: |
          set -e
          mkdir -p raw out
          views="home songs board appreciate top themes hall rules more leave"
          for v in $views; do
            ok=0
            for try in 1 2 3; do
              if curl -sL --max-time 120 -A "$UA" -o "raw/$v.html" "$EXEC?p=$v"; then
                # /exec 回的是 Google sandbox 外殼（真內容 escape 在 userHtml）；節流/錯誤頁很小
                size=$(wc -c < "raw/$v.html")
                if [ "$size" -gt 20000 ] && grep -q 'userHtml' "raw/$v.html"; then ok=1; break; fi
              fi
              echo "retry $try for $v"; sleep 20
            done
            [ "$ok" = 1 ] || { echo "FAILED to fetch $v"; exit 1; }
            echo "fetched $v ($(wc -c < raw/$v.html) bytes)"
          done
      - name: Extract userHtml (strip Google wrapper)
        run: |
          set -e
          for v in home songs board appreciate top themes hall rules more leave; do
            python3 scripts/extract_userhtml.py "raw/$v.html" "out/$v.html"
            head -c 100 "out/$v.html" | grep -qi '<!doctype html' || { echo "extract failed for $v"; exit 1; }
          done
      - name: Fetch member album pages (?p=me&m=)
        run: |
          set -e
          # 成員清單直接取自剛抓的 songs 頁內嵌 MEMBERS JSON（現役成員、英文 display 名）
          python3 -c "import re, json; s = open('out/songs.html', encoding='utf-8').read(); print('\n'.join(json.loads(re.search(r',MEMBERS=(\[[^\]]*\])', s).group(1))))" > members.txt
          [ -s members.txt ] || { echo 'no members found'; exit 1; }
          cat members.txt
          while read -r name; do
            [ -n "$name" ] || continue
            # 檔名用 encodeURIComponent 同款編碼，跟 GAS 端 staticMeUrl_ 對齊
            enc=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1], safe=\"!'()*-._~\"))" "$name")
            ok=0
            for try in 1 2 3; do
              if curl -sL --max-time 120 -A "$UA" -o "raw/me-$enc.html" "$EXEC?p=me&m=$enc"; then
                size=$(wc -c < "raw/me-$enc.html")
                if [ "$size" -gt 20000 ] && grep -q 'userHtml' "raw/me-$enc.html"; then ok=1; break; fi
              fi
              echo "retry $try for me/$name"; sleep 20
            done
            [ "$ok" = 1 ] || { echo "FAILED to fetch me/$name"; exit 1; }
            python3 scripts/extract_userhtml.py "raw/me-$enc.html" "out/me-$enc.html"
            echo "me/$name ok ($(wc -c < out/me-$enc.html) bytes)"
          done < members.txt
      - name: Rewrite internal links to static pages
        run: |
          set -e
          cd out
          for v in home songs board appreciate top themes hall rules more leave; do
            # 站內導覽連結改指靜態頁；帶其他參數的連結（?p=me&m=…）保留原 GAS 網址
            sed -i -E "s|https://script\\.google\\.com/macros/s/[A-Za-z0-9_-]+/exec\\?p=$v([\"'])|$v.html\\1|g" *.html
          done
          cp home.html index.html
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
